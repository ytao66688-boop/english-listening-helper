  flutter_screenutil: ^5.9.0
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  path: ^1.8.3
  intl: ^0.18.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/pet_vocabulary.json