name: english_listening_helper
description: 英语听力助手 - 基于i+1理论的智能学习App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # 音频处理
  audioplayers: ^5.2.1
  file_picker: ^6.1.1
  permission_handler: ^11.0.1
  
  # 本地语音识别 (Whisper)
  flutter_whisper: ^0.0.1
  
  # UI组件
  flutter_screenutil: ^5.9.0
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  
  # 其他
  path: ^1.8.3
  intl: ^0.18.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/pet_vocabulary.json
    - assets/dictionary.json